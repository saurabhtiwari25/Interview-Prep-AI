spring.application.name=backend

server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/interviewdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Authentication
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# File Upload path (local)
file.upload.dir=./uploads

spring.ai.openai.chat.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

spring.ai.openai.embedding.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.embedding.options.model=gemini-embedding-001


spring.ai.vectorstore.chroma.client.host=https://interviewprep-chromadb.onrender.com
spring.ai.vectorstore.chroma.client.port=443
spring.ai.vectorstore.chroma.collection-name=interviewprep
spring.ai.vectorstore.chroma.initialize-schema=true

# CORS (override via env var CORS_ALLOWED_ORIGINS for production)
cors.allowed-origins=http://localhost:5173,http://localhost:3000
