services:

  # ─── MySQL Database ────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: interviewprep-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - interviewprep-net

  # ─── ChromaDB Vector Store ────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: interviewprep-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - interviewprep-net

  # ─── Spring Boot Backend ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewprep-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      # Map env vars to Spring Boot properties (dots → underscores)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - interviewprep-net

  # ─── React Frontend (Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: interviewprep-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - interviewprep-net

volumes:
  mysql_data:
  chroma_data:
  uploads_data:

networks:
  interviewprep-net:
    driver: bridge
